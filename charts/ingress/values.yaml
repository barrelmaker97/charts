---
baseDomain: barrelmaker.dev

# Legacy Ingress (requires an Ingress controller such as ingress-nginx)
ingress:
  enabled: true
  className: nginx
  issuerName: letsencrypt-prod

# Gateway API HTTPRoute replacement for the legacy Ingress
httpRoute:
  enabled: false
  # Gateways this route should attach to
  parentRefs: []
  #  - name: gateway
  #    namespace: envoy-gateway-system
