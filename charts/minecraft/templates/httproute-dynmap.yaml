{{- if .Values.dynmap.httpRoute.enabled -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "minecraft.fullname" . }}-dynmap
  labels:
    {{- include "minecraft.labels" . | nindent 4 }}
  {{- with .Values.dynmap.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- with .Values.dynmap.httpRoute.parentRefs }}
  parentRefs:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  {{- with .Values.dynmap.httpRoute.hostnames }}
  hostnames:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  rules:
    - matches:
        {{- toYaml .Values.dynmap.httpRoute.matches | nindent 8 }}
      {{- with .Values.dynmap.httpRoute.filters }}
      filters:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ include "minecraft.fullname" . }}-dynmap
          port: 8123
    {{- with .Values.dynmap.httpRoute.additionalRules }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
{{- end }}
