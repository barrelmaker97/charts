---
image:
  repository: ghcr.io/serge-chat/serge
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

persistence:
  data:
    storageClassName: ""
    size: 16Gi
  weights:
    storageClassName: ""
    size: 64Gi

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext: {}
  # runAsNonRoot: true
  # runAsUser: 2000
  # runAsGroup: 2000
  # fsGroup: 2000

securityContext: {}
  # allowPrivilegeEscalation: false
  # capabilities:
  #   drop:
  #   - ALL

service:
  type: ClusterIP
  port: 8008

httpRoute:
  enabled: false
  annotations: {}
  # Gateways this route should attach to
  parentRefs: []
  #  - name: gateway
  #    namespace: envoy-gateway-system
  #    sectionName: https
  hostnames: []
  #  - serge.local
  matches:
    - path:
        type: PathPrefix
        value: /
  # Filters applied to requests matching the rule above
  filters: []
  # Additional custom rules appended to the route
  additionalRules: []

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}

tolerations: []

affinity: {}
